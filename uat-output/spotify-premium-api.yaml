            properties:
              artist_gid:
                type: string
              artist_name:
                type: string
              role:
                type: string
        canonical_uri:
          type: string
        prerelease_config:
          type: object
          nullable: true
          properties:
            earliest_reveal_date:
              type: object
              properties:
                year:
                  type: number
                month:
                  type: number
                day:
                  type: number
                hour:
                  type: number
        content_authorization_attributes:
