              id:
                type: string
        earliest_live_timestamp:
          type: number
        has_lyrics:
          type: boolean
        licensor:
          type: object
          properties:
            uuid:
              type: string
        language_of_performance:
          type: array
          items:
            type: string
        original_audio:
          type: object
          properties:
            uuid:
              type: string
            format:
