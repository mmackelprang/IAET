name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore tools
        run: dotnet tool restore
      - name: Restore
        run: dotnet restore Iaet.slnx
      - name: Build
        run: dotnet build Iaet.slnx --no-restore -c Release
      - name: Test
        run: dotnet test Iaet.slnx --no-build -c Release --collect:"XPlat Code Coverage"
      - name: Pack
        run: dotnet pack Iaet.slnx --no-build -c Release -o artifacts/
      - uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/*.nupkg
